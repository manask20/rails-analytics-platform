services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app_development
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    ports:
      - "5672:5672"
      - "15672:15672" # RabbitMQ management UI
    volumes:
      - rabbitdata:/var/lib/rabbitmq

  rails:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://app:app@postgres:5432/app_development
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672
    volumes:
      - ./api:/rails
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    command: bash -lc "bundle exec rails db:prepare && bundle exec rails s -b 0.0.0.0 -p 3000"

  worker:
    build:
      context: ./worker
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672
      DATABASE_URL: postgres://app:app@postgres:5432/app_development
    volumes:
      - ./worker:/worker
    depends_on:
      - postgres
      - redis
      - rabbitmq

volumes:
  pgdata:
  rabbitdata:
